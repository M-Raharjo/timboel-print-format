name: Deploy ERPNext Print Formats

on:
  push:
    branches:
      - main
    paths:
      - "build.py"
      - "deploy.sh"
      - "print-format-map.txt"
      - "partials/**"
      - "templates/**"
      - ".github/workflows/deploy-print-formats.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build templates
        run: python3 build.py

      - name: Show build output
        run: |
          ls -lah build
          for f in build/*.html; do
            echo "----- $f -----"
            wc -c "$f"
          done

      - name: Upload built HTML
        uses: actions/upload-artifact@v4
        with:
          name: built-print-formats
          path: build/*.html

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download built HTML
        uses: actions/download-artifact@v4
        with:
          name: built-print-formats
          path: build

      - name: Make deploy script executable
        run: chmod +x deploy.sh

      - name: Show deploy inputs
        run: |
          ls -lah
          ls -lah build
          cat print-format-map.txt

      - name: Deploy to ERPNext
        env:
          ERPNEXT_BASE_URL: ${{ secrets.ERPNEXT_BASE_URL }}
          ERPNEXT_API_KEY: ${{ secrets.ERPNEXT_API_KEY }}
          ERPNEXT_API_SECRET: ${{ secrets.ERPNEXT_API_SECRET }}
        run: ./deploy.sh