{% if doc.docstatus == 0 %}
  <div style="
    width: 100%;
    text-align: center;
    font-size: 20pt;
    font-weight: bold;
    letter-spacing: 2px;
    border: 2px solid #000;
    padding: 3mm 0;
    margin-bottom: 4mm;
  ">
    DRAFT
  </div>
{% elif doc.docstatus == 2 %}
  <div style="
    width: 100%;
    text-align: center;
    font-size: 20pt;
    font-weight: bold;
    letter-spacing: 2px;
    border: 2px solid #000;
    padding: 3mm 0;
    margin-bottom: 4mm;
  ">
    CANCELLED
  </div>
{% endif %}
