<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Packing Slip Labels</title> 
    <style>
@page { size: A4; margin: 1mm; }
    body {
      margin: 1mm;
      padding: 0;
      font-family: "Courier New", Courier, monospace;
      font-size: 8pt;
      color: #000;
    }
    /*div {
      border: 1px solid black;
    }*/
    
    .print-format,
    .print-format-wrapper,
    .print-heading,
    .page-break,
    .page-break .print-format,
    html, body {
      margin: 5px !important;
      padding: 5px !important;
    }
    
    .print-format {
      width: 100% !important;
      max-width: 100% !important;
    }

    .row {display: grid; grid-template-columns: 1fr auto 1fr; gap: 8mm; align-items: start;}
    .left { text-align: left; }
    .mid  { text-align: center; }
    .right{ text-align: right; }

    .doc-id { font-size: 9pt; font-weight: bold; }
    .muted { opacity: 0.9; }
    .block { margin: 5px 0; }
    .meta-row {font-size:8pt; display: flex; justify-content: space-between; }
    .meta-label { font-weight: bold; text-align: left; }
    .meta-value { text-align: right;}

    table { width: 100%; border-collapse: collapse; margin-top: 6px; }
    th {
      font-size: 9pt;
      text-align: left;
      border-bottom: 1px solid #000;
    }
    td {
      font-size: 8pt;
      
    }
    tr {
      border-bottom: 1px dotted #999;
    }

    .num { text-align: right; white-space: nowrap; }
    .itemcol { width: 35%; }
    .photocol { width: 18%; }

    .totals { width: 45%; }
    .totals td { border-bottom: none; }
    .label { text-align: left; }
    .value { text-align: right; }

    .no-border td { border-bottom: none; }

    .qr-node {
    display: inline-block;
    }

    .qr-node img,
    .qr-node canvas {
      display: block;
      }

    @media print { body { margin: 0; } }
</style>
  </head>
  <body>
    <div class="print-format">
      <!-- LABEL 1 -->
      <div class="block">
        <div class="row block">
          <div class="left">
            <div class="muted">CUSTOMER</div>
            <div class="doc-id" style="font-size:4em; white-space: nowrap; overflow:hidden; text-overflow: ellipsis;">Bapak Irwan SK</div>
          </div>
          <div class="mid"></div>
          <div class="right">
            <div class="muted">CRATE</div>
            <div class="doc-id" style="font-size:4em; white-space: nowrap; overflow:hidden; text-overflow: ellipsis;">1/2</div>
          </div>
        </div>
        <div class="row block">
          <div class="left">
            <div class="block">
              <div class="muted">TIMBOEL ITEM ID</div>
              <h1> PPS-D1388A01-NSS </h1>
            </div>
            <div class="block">
              <div class="muted">CUSTOMER ITEM ID</div>
              <h2> CUST-ITEM-001 </h2>
            </div>
            <div class="block">
              <div class="muted">QTY IN CRATE</div>
              <h1> 1 </h1>
            </div>
          </div>
          <div class="mid">
            <div class="qr-node" data-qr="PPS-D1388A01-NSS"></div>
            <div>testststststststststst</div>
          </div>
          <div class="right">
            <div class="block">
              <div class="muted">DESCRIPTION</div>
              <h2> Pouncing Panther - M - Natural Silver Stainless - Wood Base <br> 140 x 20 x 430 <br> black silver TP <br> whatever </h2>
            </div>
          </div>
        </div>
        <hr> 
        <script src="https://unpkg.com/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
(function () {
  function renderQRCodes() {
    var nodes = document.querySelectorAll(".qr-node");

    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      var text = el.getAttribute("data-qr") || "";

      if (!text) continue;

      el.innerHTML = "";

      try {
        new QRCode(el, {
          text: text,
          width: 120,
          height: 120,
          correctLevel: QRCode.CorrectLevel.M
        });
      } catch (e) {
        console.error("QR render failed", e, text);
      }
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", renderQRCodes);
  } else {
    renderQRCodes();
  }
})();
</script>
  </body>
</html>
